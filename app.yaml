command:
  - streamlit
  - run
  - project/app_streamlit.py
  - --server.address=0.0.0.0
  - --server.port=8000

secrets:
  - scope: databricks-evaluation-app
    key: DATABRICKS_HOST
    env_var: DATABRICKS_HOST
  - scope: agent-obo-scope
    key: obo-token
    env_var: DATABRICKS_OBO_TOKEN

env:
  - name: PYTHONPATH
    value: .
  - name: LLM_PROVIDER
    value: databricks
  - name: DATABRICKS_MODEL_ENDPOINT
    value: databricks-meta-llama-3-3-70b-instruct

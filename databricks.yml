# This is a Databricks asset bundle definition for databricks-multi-agent.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: databricks-multi-agent

resources:
  apps:
    databricks-multi-agent:
      name: databricks-multi-agent
      source_code_path: ${workspace.file_path}
      resources:
        - name: llm-endpoint
          serving_endpoint:
            name: databricks-meta-llama-3-3-70b-instruct
            permission: CAN_QUERY
        - name: app-secret-databricks-host
          secret:
            scope: databricks-evaluation-app
            key: DATABRICKS_HOST
            permission: READ
        - name: app-secret-obo-token
          secret:
            scope: agent-obo-scope
            key: obo-token
            permission: READ

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-8aa0bd78-b5d4.cloud.databricks.com
    resources:
      apps:
        databricks-multi-agent:
          name: databricks-multi-agent

  prod:
    mode: production
    workspace:
      host: https://dbc-8aa0bd78-b5d4.cloud.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    resources:
      apps:
        databricks-multi-agent:
          name: databricks-multi-agent-prod

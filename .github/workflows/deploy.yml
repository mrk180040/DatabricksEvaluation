name: Deploy to Databricks

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Databricks App
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST || 'https://dbc-8aa0bd78-b5d4.cloud.databricks.com' }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      APP_NAME: databricks-multi-agent
      WORKSPACE_APP_PATH: /Workspace/Apps/databricks-multi-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate auth configuration
        run: |
          if [[ -z "${DATABRICKS_HOST}" ]]; then
            echo "DATABRICKS_HOST is not set. Configure repository/environment variable DATABRICKS_HOST."
            exit 1
          fi

          if [[ -n "${DATABRICKS_CLIENT_ID}" && -n "${DATABRICKS_CLIENT_SECRET}" ]]; then
            echo "Using Databricks OAuth M2M credentials (client ID + client secret)."
            exit 0
          fi

          if [[ -n "${DATABRICKS_TOKEN}" ]]; then
            echo "Using Databricks PAT token (DATABRICKS_TOKEN)."
            exit 0
          fi

          echo "No Databricks credentials configured for CI."
          echo "Set either DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET, or DATABRICKS_TOKEN in GitHub secrets."
          exit 1

      - name: Validate bundle
        run: databricks bundle validate --target prod

      - name: Sync source to workspace
        run: |
          databricks workspace mkdirs "${WORKSPACE_APP_PATH}"
          IMPORT_DIR=$(mktemp -d)
          rsync -a --exclude='.git' --exclude='.github' --exclude='.databricks' . "${IMPORT_DIR}/"
          databricks workspace import-dir "${IMPORT_DIR}" "${WORKSPACE_APP_PATH}" --overwrite
          rm -rf "${IMPORT_DIR}"

      - name: Deploy Databricks App
        run: |
          databricks apps get "${APP_NAME}" >/dev/null 2>&1 || databricks apps create "${APP_NAME}"
          databricks apps deploy "${APP_NAME}" --source-code-path "${WORKSPACE_APP_PATH}"

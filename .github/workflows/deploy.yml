name: Deploy to Databricks

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Databricks App
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST || 'https://dbc-8aa0bd78-b5d4.cloud.databricks.com' }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_secret_acl_principal: ${{ vars.DATABRICKS_APP_CLIENT_ID || secrets.DATABRICKS_CLIENT_ID || '' }}
      ENFORCE_SECRET_ACCESS_CHECK: ${{ vars.ENFORCE_SECRET_ACCESS_CHECK || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate auth configuration
        run: |
          if [[ -z "${DATABRICKS_HOST}" ]]; then
            echo "DATABRICKS_HOST is not set. Configure repository/environment variable DATABRICKS_HOST."
            exit 1
          fi

          if [[ -n "${DATABRICKS_CLIENT_ID}" && -n "${DATABRICKS_CLIENT_SECRET}" ]]; then
            echo "Using Databricks OAuth M2M credentials (client ID + client secret)."
            exit 0
          fi

          if [[ -n "${DATABRICKS_TOKEN}" ]]; then
            echo "Using Databricks PAT token (DATABRICKS_TOKEN)."
            exit 0
          fi

          echo "No Databricks credentials configured for CI."
          echo "Set either DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET, or DATABRICKS_TOKEN in GitHub secrets."
          exit 1

      - name: Validate bundle
        run: databricks bundle validate --target prod

      - name: Deploy bundle
        run: databricks bundle deploy --target prod

      - name: Verify secret ACLs
        run: |
          echo "Databricks auth identity (for ACL troubleshooting):"
          databricks auth describe || true

          if [[ -z "${TF_VAR_secret_acl_principal}" ]]; then
            echo "TF_VAR_secret_acl_principal is empty."
            echo "Set GitHub environment variable DATABRICKS_APP_CLIENT_ID, or ensure secret DATABRICKS_CLIENT_ID is configured."
            if [[ "${ENFORCE_SECRET_ACCESS_CHECK}" == "true" ]]; then
              echo "ENFORCE_SECRET_ACCESS_CHECK=true -> failing workflow."
              exit 1
            fi
            echo "ENFORCE_SECRET_ACCESS_CHECK=false -> continuing deploy with warning."
            exit 0
          fi

          check_secret_read() {
            local scope="$1"
            local key="$2"

            if databricks secrets get-secret "$scope" "$key" --output json >/dev/null 2>&1; then
              echo "✓ Read access verified for $scope/$key"
              return 0
            fi

            echo "✗ Read access check failed for $scope/$key"
            return 1
          }

          failures=0
          check_secret_read "databricks-evaluation-app" "DATABRICKS_HOST" || failures=$((failures + 1))
          check_secret_read "agent-obo-scope" "obo-token" || failures=$((failures + 1))

          if [[ "$failures" -gt 0 ]]; then
            echo "Secret access verification failed."
            echo "This check validates effective READ access (without requiring MANAGE on scopes)."
            echo "Remediation (run as a scope manager):"
            echo "  databricks secrets put-acl databricks-evaluation-app ${TF_VAR_secret_acl_principal} READ"
            echo "  databricks secrets put-acl agent-obo-scope ${TF_VAR_secret_acl_principal} READ"
            echo "If that principal still fails, grant READ to the exact identity shown in 'databricks auth describe'."
            if [[ "${ENFORCE_SECRET_ACCESS_CHECK}" == "true" ]]; then
              echo "ENFORCE_SECRET_ACCESS_CHECK=true -> failing workflow."
              exit 1
            fi
            echo "ENFORCE_SECRET_ACCESS_CHECK=false -> continuing deploy with warning."
            exit 0
          fi

          echo "Secret access verification passed for required scopes."
